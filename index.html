<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Rundub — กำลังเชื่อมต่อ Strava</title>
  <style>
    html, body {
      margin: 0; padding: 0; min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      background: #0a0a0a; color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .box { text-align: center; padding: 32px; max-width: 420px; }
    h1 { font-size: 20px; margin: 0 0 12px; color: #fc5200; }
    p { font-size: 14px; color: #aaa; margin: 4px 0; }
    code { color: #fc5200; word-break: break-all; }
    a { color: #fc5200; text-decoration: none; font-weight: 600; }
    .spinner {
      width: 36px; height: 36px; margin: 0 auto 16px;
      border: 3px solid #333; border-top-color: #fc5200;
      border-radius: 50%; animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .err { color: #ff6b6b; }
  </style>
</head>
<body>
  <div class="box" id="content">
    <div class="spinner"></div>
    <h1>กำลังกลับสู่แอป Rundub…</h1>
    <p>หากหน้าไม่ปิดเอง <a id="manual" href="#">กดที่นี่</a></p>
  </div>
  <script>
    (function () {
      try {
        var params = new URLSearchParams(window.location.search);
        var state = params.get('state');

        if (!state) {
          document.getElementById('content').innerHTML =
            '<h1 class="err">ไม่พบ state parameter</h1>' +
            '<p>โปรดเริ่มเชื่อมต่อใหม่จากแอป Rundub</p>';
          return;
        }

        // ส่งต่อพารามิเตอร์ทั้งหมดยกเว้น state (เช่น code, scope, error)
        params.delete('state');
        var passThrough = params.toString();

        var returnUrl = state;
        var sep = returnUrl.indexOf('?') >= 0 ? '&' : '?';
        var target = passThrough ? (returnUrl + sep + passThrough) : returnUrl;

        document.getElementById('manual').href = target;
        window.location.replace(target);
      } catch (e) {
        document.getElementById('content').innerHTML =
          '<h1 class="err">เกิดข้อผิดพลาด</h1><p><code>' + (e && e.message) + '</code></p>';
      }
    })();
  </script>
</body>
</html>
